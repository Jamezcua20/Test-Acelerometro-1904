
[platformio]
default_envs = 
	rak4630

boards_dir = rakwireless/boards

[common]
build_flags = 
	-D LIB_DEBUG=0        ; 0 Disable LoRaWAN debug output
monitor_speed = 115200
lib_deps = 
	beegee-tokyo/SX126x-Arduino
	  sparkfun/SparkFun LIS3DH Arduino Library @ ^1.0.3
[env:rak4630]
monitor_speed = 115200  ; <-- agregar aquí también, no solo en [common]
platform = nordicnrf52
board = rak4630 
framework = arduino
build_src_filter = ${env.build_src_filter}+<../rakwireless/variants/rak4630>
build_flags = 
    ; -DCFG_DEBUG=1
	${common.build_flags}
	-I rakwireless/variants/rak4630
	-D LIB_DEBUG=3        ; 3 = máximo debug del stack LoRaWAN
lib_deps = 
	${common.lib_deps}
extra_scripts = 
	pre:rename.py
	post:create_uf2.py
